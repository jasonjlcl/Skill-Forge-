services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-genai_onboarding}
    volumes:
      # Persistent Postgres data volume.
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-genai_onboarding}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  chroma:
    image: chromadb/chroma:0.5.15
    restart: unless-stopped
    environment:
      IS_PERSISTENT: 'TRUE'
      CHROMA_SERVER_HOST: 0.0.0.0
      CHROMA_SERVER_HTTP_PORT: 8000
      PERSIST_DIRECTORY: /chroma/chroma
    volumes:
      # Persistent Chroma vector data volume.
      - chroma_data:/chroma/chroma
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'python -c "import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/v1/heartbeat\")"',
        ]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s

  migrate:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: build
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/genai_onboarding}
    depends_on:
      postgres:
        condition: service_healthy
    command: ['npm', 'run', 'migrate']
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/genai_onboarding}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-genai_onboarding}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-64}
      CHROMA_URL: ${CHROMA_URL:-http://chroma:8000}
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-training_documents}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-200}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-20}
      LOGIN_MAX_ATTEMPTS: ${LOGIN_MAX_ATTEMPTS:-5}
      LOGIN_LOCKOUT_MINUTES: ${LOGIN_LOCKOUT_MINUTES:-15}
      REQUEST_BODY_LIMIT: ${REQUEST_BODY_LIMIT:-2mb}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-20000}
      RETRY_JITTER_RATIO: ${RETRY_JITTER_RATIO:-0.2}
      LLM_RETRY_MAX_ATTEMPTS: ${LLM_RETRY_MAX_ATTEMPTS:-3}
      LLM_RETRY_BASE_DELAY_MS: ${LLM_RETRY_BASE_DELAY_MS:-300}
      LLM_RETRY_MAX_DELAY_MS: ${LLM_RETRY_MAX_DELAY_MS:-2500}
      LLM_CIRCUIT_FAILURE_THRESHOLD: ${LLM_CIRCUIT_FAILURE_THRESHOLD:-6}
      LLM_CIRCUIT_OPEN_MS: ${LLM_CIRCUIT_OPEN_MS:-45000}
      VECTOR_RETRY_MAX_ATTEMPTS: ${VECTOR_RETRY_MAX_ATTEMPTS:-3}
      VECTOR_RETRY_BASE_DELAY_MS: ${VECTOR_RETRY_BASE_DELAY_MS:-200}
      VECTOR_RETRY_MAX_DELAY_MS: ${VECTOR_RETRY_MAX_DELAY_MS:-1500}
      VECTOR_CIRCUIT_FAILURE_THRESHOLD: ${VECTOR_CIRCUIT_FAILURE_THRESHOLD:-6}
      VECTOR_CIRCUIT_OPEN_MS: ${VECTOR_CIRCUIT_OPEN_MS:-30000}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      STREAM_REQUEST_TTL_SECONDS: ${STREAM_REQUEST_TTL_SECONDS:-120}
      DATA_RETENTION_DAYS: ${DATA_RETENTION_DAYS:-180}
      OTEL_EXPORTER_MODE: ${OTEL_EXPORTER_MODE:-none}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-skillforge-api}
      OTEL_SERVICE_VERSION: ${OTEL_SERVICE_VERSION:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_METRIC_EXPORT_INTERVAL_MS: ${OTEL_METRIC_EXPORT_INTERVAL_MS:-60000}
      OTEL_METRIC_EXPORT_TIMEOUT_MS: ${OTEL_METRIC_EXPORT_TIMEOUT_MS:-10000}
      RETENTION_JOB_AUTH_TOKEN: ${RETENTION_JOB_AUTH_TOKEN:-}
      RETENTION_JOB_OIDC_AUDIENCE: ${RETENTION_JOB_OIDC_AUDIENCE:-}
      RETENTION_JOB_ALLOWED_SERVICE_ACCOUNTS: ${RETENTION_JOB_ALLOWED_SERVICE_ACCOUNTS:-}
      RETENTION_JOB_EDGE_SHARED_KEY: ${RETENTION_JOB_EDGE_SHARED_KEY:-}
      SHUTDOWN_TIMEOUT_MS: ${SHUTDOWN_TIMEOUT_MS:-15000}
    depends_on:
      migrate:
        condition: service_completed_successfully
      chroma:
        condition: service_healthy
    expose:
      - '4000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://localhost:4000/api/health\").then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '${WEB_HTTP_PORT:-80}:80'

volumes:
  postgres_data:
  chroma_data:
